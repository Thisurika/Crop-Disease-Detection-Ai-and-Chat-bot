<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Plant Disease Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
    <div class="container">
        <!-- Upload Card -->
        <div class="card upload-card">
            <h2>Upload Leaf Image</h2>
            <p>Upload an image of your plant leaf for AI analysis</p>

            <div class="upload-area" id="upload-area">
                <i class="fas fa-cloud-upload-alt fa-5x" id="upload-icon"></i>
                <p id="upload-text">Click "Choose Photo" or drag & drop here</p>
                <p>JPG, PNG, WEBP (MAX 5MB)</p>

                <!-- Hidden file input -->
                <input type="file" id="fileInput" accept="image/*" hidden />

                <!-- Visible Choose Photo button -->
                <button id="choosePhotoBtn" class="choose-btn">Choose Photo</button>
            </div>

            <button id="detectBtn" class="btn" disabled>Detect Disease</button>
        </div>

        <!-- Result Card -->
        <div class="card result-card" id="resultCard" style="display: none;">
            <h2>Analysis Result</h2>

            <div class="result-item">
                <span class="label">Disease identified</span>
                <span class="value success" id="disease-name">—</span>
            </div>

            <div class="result-item">
                <span class="label">Confidence Level</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="confidence-bar" style="width: 0%;"></div>
                    <span class="progress-text" id="confidence-text">0%</span>
                </div>
            </div>

            <div class="result-item advice">
                <span class="label">Expert Advice</span>
                <p id="advice-text">Upload and analyze to get advice...</p>
            </div>

            <img id="preview-img" src="" alt="Uploaded Leaf" style="display: none; max-width: 100%; border-radius: 12px; margin-top: 20px;" />
        </div>
    </div>

    <!-- Chat Section -->
    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="chat-header">
            <h3>Chat with Plant AI</h3>
        </div>
        <div class="chat-body" id="chatBody"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Ask about treatment, prevention..." />
            <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
